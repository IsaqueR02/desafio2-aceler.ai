# fly.toml app configuration file generated for desafio2-aceler-ai on 2026-07-06T15:57:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'desafio2-aceler-ai'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[vm]]
  memory = '16gb'
  cpu_kind = 'performance'
  cpus = 2
  memory_mb = 16384
  processes = ['app']
  size = 'performance-cpu-2x'
